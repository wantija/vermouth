name: Build Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: vermouth
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # -------------------
      # Install dependencies
      # -------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake qt6-base-dev qt6-declarative-dev \
            qt6-multimedia-dev qt6-tools-dev-tools \
            flatpak-builder rpm dpkg-dev extra-cmake-modules

      # -------------------
      # Build application
      # -------------------
      - name: Build app
        run: |
          mkdir -p build
          cmake -S . -B build -DCPACK_PACKAGE_VERSION=${VERSION} -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build
          cmake --install build --prefix build/package

      # -------------------
      # Build DEB using CPack
      # -------------------
      - name: Build DEB
        run: |
          cd build
          cpack -G DEB
          cd ..

      # -------------------
      # Build RPM using CPack
      # -------------------
      - name: Build RPM
        run: |
          cd build
          cpack -G RPM
          cd ..

      # -------------------
      # Build Flatpak
      # -------------------
      - name: Build Flatpak
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak-builder --force-clean --repo=flatpakrepo build-dir com.dekomote.${APP_NAME}.yml --install-deps-from=flathub --no-fuse
          flatpak build-bundle repo build/${APP_NAME}-${VERSION}.flatpak com.dekomote.${APP_NAME}.yml ${VERSION}

      # -------------------
      # Upload artifacts
      # -------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            build/*.deb
            build/*.rpm
            build/${APP_NAME}-${VERSION}.flatpak
