name: Build Arch Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Setup build user
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel cmake ninja extra-cmake-modules git nodejs \
            qt6-base qt6-declarative \
            kirigami ki18n kcoreaddons qqc2-desktop-style sdl2
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate PKGBUILD
        run: |
          PKGVER=$(grep -oP 'project\(vermouth VERSION \K[0-9.]+' CMakeLists.txt)
          PKGDESC=$(grep -oP 'set\(APP_DESCRIPTION "\K[^"]+' CMakeLists.txt)
          PKGURL=$(grep -oP 'set\(APP_HOMEPAGE "\K[^"]+' CMakeLists.txt)
          PKGLICENSE=$(grep -oP 'set\(APP_LICENSE "\K[^"]+' CMakeLists.txt)

          cat > PKGBUILD <<EOF
          # Maintainer: Dejan Noveski <deko@duck.com>
          pkgname=vermouth
          pkgver=${PKGVER}
          pkgrel=1
          pkgdesc="${PKGDESC}"
          arch=('x86_64')
          url="${PKGURL}"
          license=('${PKGLICENSE}')
          depends=(
              'qt6-base'
              'qt6-declarative'
              'kirigami'
              'ki18n'
              'kcoreaddons'
              'qqc2-desktop-style'
          )
          makedepends=(
              'cmake'
              'ninja'
              'extra-cmake-modules'
              'sdl2'
          )
          optdepends=(
              'icoutils: Windows icon extraction'
              'sdl2: gamepad support'
          )
          source=()
          sha256sums=()

          build() {
              cmake -B build -S "\$startdir" \\
                  -G Ninja \\
                  -DCMAKE_BUILD_TYPE=Release \\
                  -DCMAKE_INSTALL_PREFIX=/usr
              cmake --build build
          }

          package() {
              DESTDIR="\$pkgdir" cmake --install build
              install -Dm644 "\$startdir/LICENSE" "\$pkgdir/usr/share/licenses/\$pkgname/LICENSE"
          }
          EOF

          sed -i 's/^          //' PKGBUILD

      - name: Build package
        run: |
          chown -R builder:builder .
          su builder -c "makepkg -sf --noconfirm"

      - name: Rename package
        run: for f in *.pkg.tar.zst; do mv "$f" "${f%.pkg.tar.zst}-arch.pkg.tar.zst"; done

      - name: Install and verify
        run: |
          pacman -U --noconfirm ./*.pkg.tar.zst
          test -x "$(command -v vermouth)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-arch
          path: "*.pkg.tar.zst"
