name: Build RPM

on:
  push:
    tags:
      - 'v*'

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:43

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          dnf upgrade --refresh -y
          dnf install -y \
            cmake gcc-c++ extra-cmake-modules node \
            qt6-qtbase-devel qt6-qtdeclarative-devel qt6-qtquickcontrols2-devel \
            kf6-kirigami-devel kf6-kcoreaddons-devel kf6-ki18n-devel kf6-qqc2-desktop-style \
            SDL2-devel rpmbuild

      - name: Build and package
        run: |
          cmake -S . -B build -DCPACK_PACKAGE_VERSION=${{ github.ref_name }} -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build
          cpack --config build/CPackConfig.cmake -G RPM

      - name: Rename package
        run: for f in *.rpm; do mv "$f" "${f%.rpm}-fedora.rpm"; done

      - name: Install and verify
        run: |
          dnf install -y ./*.rpm
          test -x "$(command -v vermouth)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fedora
          path: "*.rpm"
