app-id: com.dekomote.Vermouth
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: vermouth

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --filesystem=~/.steam:ro
  - --filesystem=~/.local/share/Steam:ro
  - --filesystem=xdg-desktop
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: vermouth
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: .
    post-install:
      - install -Dm644 assets/vermouth.desktop ${FLATPAK_DEST}/share/applications/com.dekomote.Vermouth.desktop
      - install -Dm644 assets/vermouth.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/com.dekomote.Vermouth.svg
      - desktop-file-edit --set-key=Icon --set-value=com.dekomote.Vermouth ${FLATPAK_DEST}/share/applications/com.dekomote.Vermouth.desktop
